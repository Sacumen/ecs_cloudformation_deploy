AWSTemplateFormatVersion: '2010-09-09'
Description: 'Amazon MSK (Managed Kafka) Cluster for SacuNxt ECS Deployment'

Parameters:
  ProjectName:
    Type: String
    Default: sacunxt
  KafkaVersion:
    Type: String
    Default: 3.5.1
  BrokerInstanceType:
    Type: String
    Default: kafka.m5.large
  NumberOfBrokerNodes:
    Type: Number
    Default: 2
  VolumeSize:
    Type: Number
    Default: 100

Resources:
  MSKLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/msk/${ProjectName}
      RetentionInDays: 7

  MSKConfiguration:
    Type: AWS::MSK::Configuration
    Properties:
      Name: !Sub ${ProjectName}-msk-configuration
      Description: Enable automatic topic creation for ECS microservices
      KafkaVersionsList:
        - !Ref KafkaVersion
      ServerProperties: |
        auto.create.topics.enable=true
        num.partitions=3

  MSKCluster:
    Type: AWS::MSK::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-msk-cluster
      KafkaVersion: !Ref KafkaVersion
      NumberOfBrokerNodes: !Ref NumberOfBrokerNodes
      ConfigurationInfo:
        Arn: !Ref MSKConfiguration
        Revision: !GetAtt MSKConfiguration.LatestRevision.Revision
      BrokerNodeGroupInfo:
        InstanceType: !Ref BrokerInstanceType
        ClientSubnets:
          - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet1Id
          - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet2Id
        SecurityGroups:
          - Fn::ImportValue: !Sub ${ProjectName}-MSKSecurityGroupId
        StorageInfo:
          EBSStorageInfo:
            VolumeSize: !Ref VolumeSize
      EncryptionInfo:
        EncryptionInTransit:
          ClientBroker: TLS_PLAINTEXT
          InCluster: true
      EnhancedMonitoring: DEFAULT
      LoggingInfo:
        BrokerLogs:
          CloudWatchLogs:
            Enabled: true
            LogGroup: !Ref MSKLogGroup
      Tags:
        Name: !Sub ${ProjectName}-msk-cluster

  MSKDescribeRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: msk-describe-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - kafka:GetBootstrapBrokers
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  MSKBootstrapLambda:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt MSKDescribeRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import urllib3

          http = urllib3.PoolManager()

          def send(event, context, status, data):
              responseBody = {
                  'Status': status,
                  'Reason': 'See CloudWatch Logs',
                  'PhysicalResourceId': context.log_stream_name,
                  'StackId': event['StackId'],
                  'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'],
                  'Data': data
              }
              http.request(
                  'PUT',
                  event['ResponseURL'],
                  body=json.dumps(responseBody),
                  headers={'Content-Type': ''}
              )

          def handler(event, context):
              try:
                  cluster_arn = event['ResourceProperties']['ClusterArn']
                  client = boto3.client('kafka')
                  response = client.get_bootstrap_brokers(ClusterArn=cluster_arn)
                  brokers = response.get('BootstrapBrokerString', '') or response.get('BootstrapBrokerStringTls', '')
                  send(event, context, 'SUCCESS', {'Brokers': brokers})
              except Exception as e:
                  send(event, context, 'FAILED', {'Error': str(e)})

  MSKBootstrapBrokers:
    Type: Custom::MSKBootstrap
    DependsOn: MSKCluster
    Properties:
      ServiceToken: !GetAtt MSKBootstrapLambda.Arn
      ClusterArn: !Ref MSKCluster

Outputs:
  MSKClusterArn:
    Description: ARN of MSK Cluster
    Value: !Ref MSKCluster
    Export:
      Name: !Sub ${ProjectName}-MSKClusterArn

  BootstrapBrokersPlaintext:
    Description: Kafka Bootstrap Brokers (PLAINTEXT)
    Value: !GetAtt MSKBootstrapBrokers.Brokers
    Export:
      Name: !Sub ${ProjectName}-BootstrapBrokersPlaintext