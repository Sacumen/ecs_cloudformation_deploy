AWSTemplateFormatVersion: '2010-09-09'
Description: 'ECS Cluster and Microservices for SacuNxt Deployment (with ECS Services)'

Parameters:
  ProjectName:
    Type: String
    Default: sacunxt
  
  PrivateDnsNamespaceName:
    Type: String
    Default: sacunxt.local
    Description: Private DNS namespace for ECS service discovery
  
  ECRRepositoryURL:
    Type: String
    Description: Base ECR repository URL without the service suffix

  TaskExecutionRoleArn:
    Type: String
    Description: ECS task execution role ARN

  DBEndpoint:
    Type: String
    Description: RDS endpoint

  RedisEndpoint:
    Type: String
    Description: Redis endpoint

  KafkaBroker:
    Type: String
    Description: Single MSK broker hostname without port (for example b-1.sacunxtmskcluster.91w189.c21.kafka.us-east-1.amazonaws.com)
  
  APIServiceVersion:
    Type: String
    Default: '2.3.4'
  
  SchedulerServiceVersion:
    Type: String
    Default: '2.3.4'
  
  ConfigServiceVersion:
    Type: String
    Default: '2.3.2'
  
  CollectorServiceVersion:
    Type: String
    Default: '2.3.13'
  
  NormalizerServiceVersion:
    Type: String
    Default: '2.3.7'
  
  PublisherServiceVersion:
    Type: String
    Default: '2.3.10'
  
  DBUsername:
    Type: String
    Default: sacunxt
    NoEcho: true
  
  DBPassword:
    Type: String
    NoEcho: true

Resources:

  ECSCluster:
    Type: AWS::ECS::Cluster

  APIServiceDiscoveryNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Ref PrivateDnsNamespaceName
      Vpc:
        Fn::ImportValue: !Sub ${ProjectName}-VPCId
      Description: Private DNS namespace for ECS services

  APIServiceDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: api-service
      NamespaceId: !Ref APIServiceDiscoveryNamespace
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 60
        RoutingPolicy: MULTIVALUE
      HealthCheckCustomConfig:
        FailureThreshold: 1

  APIServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/api-service-${AWS::StackName}
      RetentionInDays: 14

  SchedulerServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/scheduler-service-${AWS::StackName}
      RetentionInDays: 14

  ConfigServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/config-service-${AWS::StackName}
      RetentionInDays: 14

  CollectorServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/collector-service-${AWS::StackName}
      RetentionInDays: 14

  NormalizerServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/normalizer-service-${AWS::StackName}
      RetentionInDays: 14

  PublisherServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/${ProjectName}/publisher-service-${AWS::StackName}
      RetentionInDays: 14

  ##########################################
  # API SERVICE
  ##########################################
  APIServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: api-service
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      ContainerDefinitions:
        - Name: api-service
          Image: !Sub ${ECRRepositoryURL}/api-service:${APIServiceVersion}
          Essential: true
          DependsOn:
            - ContainerName: postgres-proxy
              Condition: START
            - ContainerName: kafka-proxy
              Condition: START
          PortMappings:
            - ContainerPort: 8000
          Environment:
            - Name: LOG_LEVEL
              Value: DEBUG
            - Name: DB_HOST
              Value: localhost
            - Name: DB_PORT
              Value: '5432'
            - Name: DB_NAME
              Value: api_service
            - Name: DB_USER
              Value: !Ref DBUsername
            - Name: DB_PASSWORD
              Value: !Ref DBPassword
            - Name: DB_SCHEMA
              Value: public
            - Name: SSL_MODE
              Value: 'true'
            - Name: PRODUCER_CLUSTER
              Value: localhost:9092
            - Name: INTEGRATION_TOPIC
              Value: integrations
            - Name: ACTION_TOPIC
              Value: actions
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref APIServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: api
        - Name: postgres-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:5432,fork
            - !Sub 'TCP:${DBEndpoint}:5432'
        - Name: redis-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:6379,fork
            - !Sub 'TCP:${RedisEndpoint}:6379'
        - Name: kafka-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:9092,fork
            - !Sub 'TCP:${KafkaBroker}:9092'

  APIService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: api-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref APIServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      ServiceRegistries:
        - RegistryArn: !GetAtt APIServiceDiscoveryService.Arn
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet1Id
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet2Id
          SecurityGroups:
            - Fn::ImportValue: !Sub ${ProjectName}-ECSTasksSecurityGroupId

  ##########################################
  # SCHEDULER SERVICE
  ##########################################
  SchedulerServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: scheduler-service
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      ContainerDefinitions:
        - Name: scheduler-service
          Image: !Sub ${ECRRepositoryURL}/scheduler-service:${SchedulerServiceVersion}
          Essential: true
          DependsOn:
            - ContainerName: postgres-proxy
              Condition: START
            - ContainerName: redis-proxy
              Condition: START
            - ContainerName: kafka-proxy
              Condition: START
          Environment:
            - Name: DB_HOST
              Value: localhost
            - Name: DB_PORT
              Value: '5432'
            - Name: DB_USER
              Value: !Ref DBUsername
            - Name: DB_PASSWORD
              Value: !Ref DBPassword
            - Name: DB_NAME
              Value: api_service
            - Name: DB_SCHEMA
              Value: public
            - Name: SSL_MODE
              Value: 'true'
            - Name: REDIS_HOST
              Value: localhost
            - Name: REDIS_PORT
              Value: '6379'
            - Name: CONSUMER_CLUSTER
              Value: localhost:9092
            - Name: PRODUCER_CLUSTER
              Value: localhost:9092
            - Name: INGESTION_TOPIC
              Value: ingestions
            - Name: JOBS_TOPIC
              Value: jobs
            - Name: RESULT_TOPIC
              Value: results
            - Name: JOBS_TOPIC_PARTITION
              Value: '1'
            - Name: RESULT_TOPIC_PARTITION
              Value: '1'
            - Name: REPLICATION_FACTOR
              Value: '1'
            - Name: SCHEDULER_RETRIES
              Value: '5'
            - Name: LOG_LEVEL
              Value: DEBUG
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref SchedulerServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: scheduler
        - Name: postgres-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:5432,fork
            - !Sub 'TCP:${DBEndpoint}:5432'
        - Name: redis-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:6379,fork
            - !Sub 'TCP:${RedisEndpoint}:6379'
        - Name: kafka-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:9092,fork
            - !Sub 'TCP:${KafkaBroker}:9092'

  SchedulerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: scheduler-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref SchedulerServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet1Id
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet2Id
          SecurityGroups:
            - Fn::ImportValue: !Sub ${ProjectName}-ECSTasksSecurityGroupId

  ##########################################
  # CONFIG SERVICE
  ##########################################
  ConfigServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: config-service
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      ContainerDefinitions:
        - Name: config-service
          Image: !Sub ${ECRRepositoryURL}/config-service:${ConfigServiceVersion}
          Essential: true
          DependsOn:
            - ContainerName: postgres-proxy
              Condition: START
            - ContainerName: redis-proxy
              Condition: START
            - ContainerName: kafka-proxy
              Condition: START
          Environment:
            - Name: DB_HOST
              Value: localhost
            - Name: DB_PORT
              Value: '5432'
            - Name: DB_USER
              Value: !Ref DBUsername
            - Name: DB_PASSWORD
              Value: !Ref DBPassword
            - Name: DB_NAME
              Value: api_service
            - Name: DB_SCHEMA
              Value: public
            - Name: SSL_MODE
              Value: 'true'
            - Name: REDIS_HOST
              Value: localhost
            - Name: REDIS_PORT
              Value: '6379'
            - Name: CONSUMER_CLUSTER
              Value: localhost:9092
            - Name: PRODUCER_CLUSTER
              Value: localhost:9092
            - Name: INTEGRATION_TOPIC
              Value: integrations
            - Name: INGESTION_TOPIC
              Value: ingestions
            - Name: LOG_LEVEL
              Value: DEBUG
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ConfigServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: config
        - Name: postgres-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:5432,fork
            - !Sub 'TCP:${DBEndpoint}:5432'
        - Name: redis-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:6379,fork
            - !Sub 'TCP:${RedisEndpoint}:6379'
        - Name: kafka-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:9092,fork
            - !Sub 'TCP:${KafkaBroker}:9092'

  ConfigService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: config-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ConfigServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet1Id
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet2Id
          SecurityGroups:
            - Fn::ImportValue: !Sub ${ProjectName}-ECSTasksSecurityGroupId

  ##########################################
  # COLLECTOR SERVICE
  ##########################################
  CollectorServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: collector-service
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      ContainerDefinitions:
        - Name: collector-service
          Image: !Sub ${ECRRepositoryURL}/collector-service:${CollectorServiceVersion}
          Essential: true
          DependsOn:
            - ContainerName: postgres-proxy
              Condition: START
            - ContainerName: redis-proxy
              Condition: START
            - ContainerName: kafka-proxy
              Condition: START
          Environment:
            - Name: DB_HOST
              Value: localhost
            - Name: DB_PORT
              Value: '5432'
            - Name: DB_USER
              Value: !Ref DBUsername
            - Name: DB_PASSWORD
              Value: !Ref DBPassword
            - Name: DB_NAME
              Value: api_service
            - Name: DB_SCHEMA
              Value: public
            - Name: SSL_MODE
              Value: 'true'
            - Name: REDIS_HOST
              Value: localhost
            - Name: REDIS_PORT
              Value: '6379'
            - Name: CONSUMER_CLUSTER
              Value: localhost:9092
            - Name: PRODUCER_CLUSTER
              Value: localhost:9092
            - Name: MAX_PRODUCE_SIZE
              Value: '20971520'
            - Name: JOBS_TOPIC
              Value: jobs
            - Name: RAW_DATA_TOPIC
              Value: source_data
            - Name: STATUS_TOPIC
              Value: service_status
            - Name: RAW_DATA_TOPIC_PARTITION
              Value: '1'
            - Name: STATUS_TOPIC_PARTITION
              Value: '1'
            - Name: REPLICATION_FACTOR
              Value: '1'
            - Name: THREAD_COUNT
              Value: '7'
            - Name: LOG_LEVEL
              Value: DEBUG
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref CollectorServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: collector
        - Name: postgres-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:5432,fork
            - !Sub 'TCP:${DBEndpoint}:5432'
        - Name: redis-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:6379,fork
            - !Sub 'TCP:${RedisEndpoint}:6379'
        - Name: kafka-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:9092,fork
            - !Sub 'TCP:${KafkaBroker}:9092'

  CollectorService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: collector-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref CollectorServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet1Id
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet2Id
          SecurityGroups:
            - Fn::ImportValue: !Sub ${ProjectName}-ECSTasksSecurityGroupId

  ##########################################
  # NORMALIZER SERVICE
  ##########################################
  NormalizerServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: normalizer-service
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      ContainerDefinitions:
        - Name: normalizer-service
          Image: !Sub ${ECRRepositoryURL}/normalizer-service:${NormalizerServiceVersion}
          Essential: true
          DependsOn:
            - ContainerName: redis-proxy
              Condition: START
            - ContainerName: kafka-proxy
              Condition: START
          Environment:
            - Name: REDIS_HOST
              Value: localhost
            - Name: REDIS_PORT
              Value: '6379'
            - Name: CONSUMER_CLUSTER
              Value: localhost:9092
            - Name: PRODUCER_CLUSTER
              Value: localhost:9092
            - Name: MAX_PRODUCE_SIZE
              Value: '20971520'
            - Name: RAW_DATA_TOPIC
              Value: source_data
            - Name: NORMALIZED_DATA_TOPIC
              Value: normalized_data
            - Name: STATUS_TOPIC
              Value: service_status
            - Name: NORMALIZED_DATA_TOPIC_PARTITION
              Value: '1'
            - Name: STATUS_TOPIC_PARTITION
              Value: '1'
            - Name: REPLICATION_FACTOR
              Value: '1'
            - Name: LOG_LEVEL
              Value: DEBUG
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref NormalizerServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: normalizer
        - Name: postgres-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:5432,fork
            - !Sub 'TCP:${DBEndpoint}:5432'
        - Name: redis-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:6379,fork
            - !Sub 'TCP:${RedisEndpoint}:6379'
        - Name: kafka-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:9092,fork
            - !Sub 'TCP:${KafkaBroker}:9092'

  NormalizerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: normalizer-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref NormalizerServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet1Id
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet2Id
          SecurityGroups:
            - Fn::ImportValue: !Sub ${ProjectName}-ECSTasksSecurityGroupId

  ##########################################
  # PUBLISHER SERVICE
  ##########################################
  PublisherServiceTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: publisher-service
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !Ref TaskExecutionRoleArn
      ContainerDefinitions:
        - Name: publisher-service
          Image: !Sub ${ECRRepositoryURL}/publisher-service:${PublisherServiceVersion}
          Essential: true
          DependsOn:
            - ContainerName: postgres-proxy
              Condition: START
            - ContainerName: redis-proxy
              Condition: START
            - ContainerName: kafka-proxy
              Condition: START
          Environment:
            - Name: DB_HOST
              Value: localhost
            - Name: DB_PORT
              Value: '5432'
            - Name: DB_NAME
              Value: api_service
            - Name: DB_USER
              Value: !Ref DBUsername
            - Name: DB_PASSWORD
              Value: !Ref DBPassword
            - Name: DB_SCHEMA
              Value: public
            - Name: SSL_MODE
              Value: 'true'
            - Name: REDIS_HOST
              Value: localhost
            - Name: REDIS_PORT
              Value: '6379'
            - Name: CONSUMER_CLUSTER
              Value: localhost:9092
            - Name: PRODUCER_CLUSTER
              Value: localhost:9092
            - Name: NORMALIZED_DATA_TOPIC
              Value: normalized_data
            - Name: STATUS_TOPIC
              Value: service_status
            - Name: STATUS_TOPIC_PARTITION
              Value: '1'
            - Name: REPLICATION_FACTOR
              Value: '1'
            - Name: LOG_LEVEL
              Value: DEBUG
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref PublisherServiceLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: publisher
        - Name: postgres-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:5432,fork
            - !Sub 'TCP:${DBEndpoint}:5432'
        - Name: redis-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:6379,fork
            - !Sub 'TCP:${RedisEndpoint}:6379'
        - Name: kafka-proxy
          Image: alpine/socat
          Essential: false
          Command:
            - TCP-LISTEN:9092,fork
            - !Sub 'TCP:${KafkaBroker}:9092'

  PublisherService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: publisher-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref PublisherServiceTaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet1Id
            - Fn::ImportValue: !Sub ${ProjectName}-PrivateSubnet2Id
          SecurityGroups:
            - Fn::ImportValue: !Sub ${ProjectName}-ECSTasksSecurityGroupId

Outputs:
  ECSClusterName:
    Description: ECS Cluster Name
    Value: !Ref ECSCluster
    Export:
      Name: !Sub ${ProjectName}-ECSClusterName

  APIServiceDiscoveryName:
    Description: Private DNS name for api-service service discovery
    Value: !Sub api-service.${PrivateDnsNamespaceName}
